kind = "web"
previewPath = "/"
title = "Hairstylist Portfolio"
version = "1.0.0"
id = "artifacts/hairstylist-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24661
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hairstylist-portfolio run dev"

[services.env]
PORT = "24661"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hairstylist-portfolio", "run", "build"]
publicDir = "artifacts/hairstylist-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
